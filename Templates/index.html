<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KalkulatorKu</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">
            KalkulatorKu
        </div>

        <ul class="nav-menu">

            <li>
                <button class="menu-btn active" data-menu="aritmatika">
                    Aritmatika
                </button>
            </li>

            <li>
                <button class="menu-btn" data-menu="logika">
                    Logika
                </button>
            </li>

            <li>
                <button class="menu-btn" data-menu="transformasi">
                    Transformasi
                </button>
            </li>

        </ul>

        <button id="themeToggle">
            🌙
        </button>

    </nav>

    <!-- CONTAINER -->

    <div class="container">

        <!-- DISPLAY -->

        <div class="display-box">

            <h1>KalkulatorKu</h1>

        </div>

        <!-- KALKULATOR -->

        <div class="calculator">

           <form method="POST" id="calcForm">

    <!-- INPUT -->

    <div class="input-box">

       <input
            type="text"
            class="logic-input"
            name="angka1"
            id="angka1"
            placeholder="Masukkan angka pertama"
            required
        >

       <input
            type="text"
            class="logic-input"
            name="angka2"
            id="angka2"
            placeholder="Masukkan angka kedua"
        >

    </div>

    <!-- OPERASI TERPILIH -->

    <input type="hidden" name="operasi" id="operasiInput">

    <!-- MENU ARITMATIKA -->

    <div class="menu-content active" id="aritmatika">

        <div class="buttons">

            <button type="button" class="op-btn" data-operasi="tambah">+</button>

            <button type="button" class="op-btn" data-operasi="kurang">−</button>

            <button type="button" class="op-btn" data-operasi="kali">×</button>

            <button type="button" class="op-btn" data-operasi="bagi">÷</button>

            <button type="button" class="op-btn" data-operasi="modulus">%</button>

            <button type="button" class="op-btn" data-operasi="pangkat">^</button>

            <button type="button" class="op-btn" data-operasi="akar">√</button>

            <button type="button" class="op-btn" data-operasi="floor">//</button>

            <button type="button" class="op-btn" data-operasi="faktorial">!</button>

            <button type="button" class="op-btn" data-operasi="fibonacci">Fib</button>

        </div>

    </div>

    <!-- MENU LOGIKA -->

    <div class="menu-content" id="logika">

        <div class="buttons">

            <button type="button" class="op-btn" data-operasi="and">AND</button>

            <button type="button" class="op-btn" data-operasi="or">OR</button>

            <button type="button" class="op-btn" data-operasi="not">NOT</button>

            <button type="button" class="op-btn" data-operasi="xor">XOR</button>

            <button type="button" class="op-btn" data-operasi="nand">NAND</button>

            <button type="button" class="op-btn" data-operasi="nor">NOR</button>

        </div>

    </div>

    <!-- MENU TRANSFORMASI -->
    <div class="menu-content" id="transformasi">

        <div class="transform-tabs" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto;">
            <button type="button" class="sub-tab-btn active" data-target="cat-bilangan">Bilangan</button>
            <button type="button" class="sub-tab-btn" data-target="cat-suhu">Suhu</button>
            <button type="button" class="sub-tab-btn" data-target="cat-uang">Mata Uang</button>
        </div>

        <div id="cat-bilangan" class="transform-category active">
            <h3 style="margin-bottom: 10px;">Transformasi Bilangan</h3>
            <div class="flex-row-select">
                <select class="op-select-from" data-cat="bilangan">
                    <option value="desimal">Desimal</option>
                    <option value="biner">Biner</option>
                    <option value="oktal">Oktal</option>
                    <option value="heksa">Heksa</option>
                </select>
                <span>Ke</span>
                <select class="op-select-to" data-cat="bilangan">
                    <option value="biner">Biner</option>
                    <option value="desimal">Desimal</option>
                    <option value="oktal">Oktal</option>
                    <option value="heksa">Heksa</option>
                </select>
            </div>
        </div>

        <div id="cat-suhu" class="transform-category" style="display: none;">
            <h3 style="margin-bottom: 10px;">Konversi Suhu</h3>
            <div class="flex-row-select">
                <select class="op-select-from" data-cat="suhu">
                    <option value="celcius">Celcius</option>
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="kelvin">Kelvin</option>
                    <option value="reamur">Reamur</option>
                </select>
                <span>Ke</span>
                <select class="op-select-to" data-cat="suhu">
                    <option value="fahrenheit">Fahrenheit</option>
                    <option value="celcius">Celcius</option>
                    <option value="kelvin">Kelvin</option>
                    <option value="reamur">Reamur</option>
                </select>
            </div>
        </div>

        <div id="cat-uang" class="transform-category" style="display: none;">
            <h3 style="margin-bottom: 10px;">Konversi Mata Uang</h3>
            <div class="flex-row-select">
                <select class="op-select-from" data-cat="uang">
                    <option value="idr">IDR</option>
                    <option value="usd">USD</option>
                    <option value="eur">EUR</option>
                    <option value="sgd">SGD</option>
                </select>
                <span>Ke</span>
                <select class="op-select-to" data-cat="uang">
                    <option value="usd">USD</option>
                    <option value="idr">IDR</option>
                    <option value="eur">EUR</option>
                    <option value="sgd">SGD</option>
                </select>
            </div>
        </div>

    </div>

    <!-- OPERASI AKTIF -->

    <div class="selected-operasi">

        <p>
            Operasi dipilih:
            <span id="selectedText">
                Belum dipilih
            </span>
        </p>

    </div>

    <!-- TOMBOL HITUNG -->

    <button type="submit" class="hitung-btn">

        Hitung

    </button>

</form>
            <!-- HASIL -->

            {% if hasil %}

            <div class="hasil">

                <h2>Hasil</h2>

                <p>{{ hasil.hasil }}</p>

                <div class="detail">

                    <h3>Rumus</h3>
                    <small>{{ hasil.rumus }}</small>

                    <h3>Langkah</h3>
                    <small>{{ hasil.langkah }}</small>

                </div>

            </div>

            {% endif %}

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>

</body>

</html>
